  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Luis Fernando de Paz López",
    "alternateName": "Luisfer",
    "url": "https://luisferpalo.com",

<body>

  <!-- ░░ BACKGROUND LAYERS ░░ -->
  <div class="bg-layer" id="bg-a" aria-hidden="true"></div>
  <div class="bg-layer" id="bg-b" aria-hidden="true"></div>

  <!-- ░░ MOBILE HEADER ░░ -->
  <header class="mobile-header" aria-label="Identidad">
    <div class="mobile-header__inner">
      <span class="tag tag--name">Luis</span>
      <span class="tag tag--alias">Luisfer</span>
      <span class="tag tag--full">Luis Fernando</span>
    </div>
  </header>

  <!-- ░░ MAIN LAYOUT ░░ -->
  <main class="layout">

    <!-- LEFT PANEL — Identity (desktop only) -->
    <aside class="panel panel--left" aria-label="Identidad">
      <div class="panel__inner">
        <div class="tag-group"><span class="tag tag--name">Luis</span></div>
        <div class="tag-group tag-group--alt"><span class="tag tag--alias">Luisfer</span></div>
        <div class="tag-group"><span class="tag tag--full">Luis Fernando</span></div>
      </div>
    </aside>

    <!-- CENTER — Featured Image + Controls -->
    <section class="panel panel--center" aria-label="Imagen destacada">
      <div class="image-frame">

        <!-- Stories-style progress bar -->
        <nav class="slide-nav" id="slide-nav" aria-label="Navegación de diapositivas"></nav>

        <div class="image-wrap" role="img" aria-label="Obra del portfolio">
          <img class="featured-img img-slot img-a" id="img-a" src="" alt="Obra del portfolio de Luis Fernando de Paz López" />
          <img class="featured-img img-slot img-b" id="img-b" src="" alt="Obra del portfolio de Luis Fernando de Paz López" />
        </div>

        <!-- Pause / play button -->
        <div class="image-controls">
          <button class="pause-btn" id="pause-btn"
                  aria-label="Pausar presentación"
                  aria-pressed="false">
            <!-- Pause icon -->
            <svg class="pause-icon" width="10" height="12" viewBox="0 0 10 12" fill="none" aria-hidden="true">
              <rect x="0" y="0" width="3.5" height="12" rx="1" fill="currentColor"/>
              <rect x="6.5" y="0" width="3.5" height="12" rx="1" fill="currentColor"/>
            </svg>
            <!-- Play icon -->
            <svg class="play-icon" width="11" height="12" viewBox="0 0 11 12" fill="none" aria-hidden="true" style="display:none">
              <path d="M1 1.5L10 6L1 10.5V1.5Z" fill="currentColor"/>
            </svg>
          </button>
        </div>

      </div>
    </section>

    <!-- RIGHT PANEL — Contact -->
    <aside class="panel panel--right" aria-label="Contacto">
      <div class="panel__inner panel__inner--right">
        <div class="contact-group">
          <a href="https://instagram.com/luisferpalo" class="tag tag--contact" target="_blank" rel="noopener noreferrer" aria-label="Instagram de luisferpalo">luisferpalo</a>
          <a href="mailto:hola@luisferpalo.com" class="tag tag--contact" aria-label="Enviar correo a hola@luisferpalo.com">hola@luisferpalo.com</a>
          <a href="tel:+34603524870" class="tag tag--contact" aria-label="Llamar al +34 603 52 48 70">+34 603 52 48 70</a>
        </div>
      </div>
    </aside>

  </main>

  <!-- ░░ FOOTER ░░ -->
  <footer class="site-footer" aria-label="Pie de página">
    <span class="footer-text">©2026. Designed by me.</span>
  </footer>

  <script src="script.js"></script>
