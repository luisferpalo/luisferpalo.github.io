<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luis Fernando de Paz López — Portfolio</title>
  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400;1,9..40,200&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ░░ BACKGROUND LAYER ░░ -->
  <div class="bg-layer" id="bg-a"></div>
  <div class="bg-layer" id="bg-b"></div>

  <!-- ░░ MAIN LAYOUT ░░ -->
  <main class="layout">

    <!-- LEFT PANEL — Identity -->
    <aside class="panel panel--left" aria-label="Identidad">
      <div class="panel__inner">
        <div class="tag-group">
          <span class="tag tag--name">Luis</span>
        </div>
        <div class="tag-group tag-group--alt">
          <span class="tag tag--alias">Luisfer</span>
        </div>
        <div class="tag-group">
          <span class="tag tag--full">Luis Fernando</span>
        </div>
      </div>
    </aside>

    <!-- CENTER — Featured Image + Caption -->
    <section class="panel panel--center" aria-label="Imagen destacada">
      <div class="image-frame">
        <div class="image-wrap">
          <img class="featured-img img-slot img-a" id="img-a" src="" alt="Portfolio image" />
          <img class="featured-img img-slot img-b" id="img-b" src="" alt="Portfolio image" />
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL — Contact -->
    <aside class="panel panel--right" aria-label="Contacto">
      <div class="panel__inner panel__inner--right">
        <div class="contact-group">
          <a href="https://instagram.com/luisferpalo" class="tag tag--contact" target="_blank" rel="noopener">luisferpalo</a>
          <a href="mailto:hola@luisferpalo.com" class="tag tag--contact">hola@luisferpalo.com</a>
          <a href="tel:+34603524870" class="tag tag--contact">+34 603 52 48 70</a>
        </div>
      </div>
    </aside>

  </main>

  <script src="script.js"></script>
</body>
</html>
